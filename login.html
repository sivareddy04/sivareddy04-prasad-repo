<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Team Login - Mana Vivekam</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #FAF6F0; font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl border border-stone-200 w-full max-w-md">
        <div class="text-center mb-8">
            <span class="text-4xl text-[#A34A38]"><i class="fa-solid fa-hands-holding-child"></i></span>
            <h1 class="text-2xl font-bold text-stone-800 mt-4">Team Member Login</h1>
            <p class="text-stone-500 text-sm">Access your specialized portal</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-stone-700 mb-2">Username</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-3 top-3.5 text-stone-400"></i>
                    <input type="text" id="username" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-stone-300 focus:ring-2 focus:ring-[#A34A38] outline-none">
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-stone-700 mb-2">Password</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-3.5 text-stone-400"></i>
                    <input type="password" id="password" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-stone-300 focus:ring-2 focus:ring-[#A34A38] outline-none">
                </div>
            </div>
            <button type="submit" class="w-full bg-[#A34A38] text-white font-bold py-3.5 rounded-xl hover:bg-[#82392B] transition shadow-lg">
                Sign In
            </button>
        </form>
        <p class="text-center text-xs text-stone-400 mt-6 italic">Access restricted to authorized personnel only.</p>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', { // Using relative path
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    
                    // Redirect based on role
                    if(data.role === 'admin') window.location.href = '/admin-dashboard.html';
                    else if(data.role === 'anadhasaranalayam') window.location.href = '/orphanage-portal.html';
                    else if(data.role === 'agent') window.location.href = '/agent-tasks.html';
                    else if(data.role === 'hotel') window.location.href = '/food-donator.html';
                    else if(data.role === 'donator') window.location.href = '/donor-dashboard.html';
                } else {
                    alert(data.message || 'Login failed');
                }
            } catch (err) {
                console.error(err);
                alert('Connection error');
            }
        };
    </script>
</body>
</html>
